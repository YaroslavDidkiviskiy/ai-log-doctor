<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Log Doctor{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <span class="logo">&#x1F9EA;</span> AI Log Doctor
            </a>
            <ul class="navbar-nav">
                <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a></li>
                <li><a href="/uploads" class="{% if '/uploads' in request.url.path %}active{% endif %}">Uploads</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            AI Log Doctor &mdash; Portfolio project &middot; FastAPI + SQLAlchemy + HTMX
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
